# Terminal type with full color and italic support
set -g default-terminal tmux-256color

# Mouse: scroll, select text, resize panes
set -g mouse on

# Keep selection in copy mode after mouse drag (both emacs and vi mode)
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
